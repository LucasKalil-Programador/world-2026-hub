    <rect x="104" y="199" width="92" height="50" rx="10" class="pitch"/>
    <line x1="150" y1="199" x2="150" y2="249" class="pline"/>
    <rect x="104" y="214" width="12" height="20" class="pline"/>
    <rect x="184" y="214" width="12" height="20" class="pline"/>
