name: Trigger Dokploy deploy

# The Dokploy dashboard is NOT publicly reachable (accessed via an SSH tunnel),
# so the usual GitHub -> Dokploy webhook (inbound) can't be delivered. We reverse
# it: on a push to master this job SSHes into the VPS and calls Dokploy's deploy
# webhook on localhost. Cloning is outbound, so Dokploy still pulls the new commit.
#
# This is the sole deploy workflow. The old Hostinger FTP deploy (deploy.yml) was
# retired at the Dokploy cutover (2026-07-05).
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: dokploy-deploy
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Dokploy deploy webhook over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_WEBHOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: DEPLOY_WEBHOOK
          # Dokploy's deploy webhook only parses the request as a push (and reads
          # the branch from `ref`) when it sees the `X-GitHub-Event: push` header.
          # Without it, ANY branch returns {"message":"Branch Not Match"}. The
          # configured branch is `master`. Dokploy answers HTTP 200 even on
          # failure, so we grep the body to make the job actually red on error.
          script: |
            resp=$(curl -fsS -X POST "$DEPLOY_WEBHOOK" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: push" \
              -d '{"ref":"refs/heads/master"}')
            echo "Dokploy response: $resp"
            echo "$resp" | grep -q "deployed successfully"
