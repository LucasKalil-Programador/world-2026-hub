# World Cup 2026 Hub — nginx server config for the Dokploy deploy.
#
# The app is served under the /worldcup2026 subpath (public URL:
# app.lucaskalil.com/worldcup2026). Traefik/Dokploy forwards the FULL path to
# this container WITHOUT stripping the prefix, so the container path matches the
# public path 1:1 — the same mental model as a classic public_html/worldcup2026/
# layout. In Dokploy set: Host app.lucaskalil.com,
# Path /worldcup2026, Strip Path = OFF, Container Port 80.
#
# This same pattern (serve under /appname internally, no strip) is the reusable
# template for the other app.lucaskalil.com/<appname> mini-apps.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sits behind Traefik — keep nginx's auto trailing-slash redirect relative
    # (never rewrite it to the internal container host:port).
    absolute_redirect off;
    port_in_redirect  off;

    # Compress text assets (helps first render / Lighthouse).
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/manifest+json;

    # Optional health endpoint (Docker HEALTHCHECK hits this on localhost).
    location = /healthz {
        access_log   off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Convenience: bare container root -> the app.
    location = / {
        return 302 /worldcup2026/;
    }

    # Bare /worldcup2026 -> /worldcup2026/ so relative asset paths resolve.
    location = /worldcup2026 {
        return 301 /worldcup2026/;
    }

    # PWA manifest: correct MIME type; revalidate (unversioned).
    location = /worldcup2026/manifest.json {
        default_type application/manifest+json;
        add_header   Cache-Control "no-cache";
        try_files    $uri =404;
    }

    # Live-refresh data must never be cached — the 90s poll owns freshness.
    location ~* ^/worldcup2026/data/.*\.json$ {
        add_header Cache-Control "no-store";
        try_files  $uri =404;
    }

    # Static media (icons / flags / images) — safe to cache for a while.
    location ~* ^/worldcup2026/.*\.(?:svg|png|ico|jpg|jpeg|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files  $uri =404;
    }

    # Everything else under the app (index.html, JS, CSS): no build step means
    # these are unversioned, so force revalidation to avoid stale code being
    # served to returning visitors (project "stale JS module" gotcha).
    location /worldcup2026/ {
        add_header Cache-Control "no-cache";
        try_files  $uri $uri/ =404;
    }
}
